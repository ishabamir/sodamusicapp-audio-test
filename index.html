<h1>耳机声道与频率测试</h1>
<p>播放左/右/双声道测试音，并可调节频率测试你的耳机与听力可听范围。建议佩戴耳机使用。</p>
<div class="card">
<p>左右声道与频率测试（请戴上耳机）：</p>
<button onclick="play('left')">左声道</button>
<button onclick="play('right')">右声道</button>
<button onclick="play('both')">双声道</button>
<p>频率：<input id="f" type="range" min="20" max="18000" value="440" oninput="document.getElementById('fv').textContent=this.value"> <span id="fv">440</span> Hz</p>
<script>
var ac;
function play(ch){ac=ac||new(window.AudioContext||window.webkitAudioContext)();var osc=ac.createOscillator(),g=ac.createGain();osc.frequency.value=+document.getElementById('f').value;osc.connect(g);if(ac.createStereoPanner){var p=ac.createStereoPanner();p.pan.value=ch==='left'?-1:ch==='right'?1:0;g.connect(p);p.connect(ac.destination)}else{g.connect(ac.destination)}g.gain.value=0.12;osc.start();setTimeout(function(){osc.stop()},900)}
</script>
